
#============================================================================
# Spring Properties
#============================================================================

spring.application.name=cas-storage
server.servlet.context-path=/cas-storage
server.port=8090
security.enabled=false

# ---- In-process concurrency (embedded Tomcat; for WAR on external Tomcat tune server.xml) ----
# Override per environment via env or profile-specific properties (e.g. SERVER_TOMCAT_THREADS_MAX).
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=100

# ---- Shared WebClient pool for DAS (matches ApplicationConfig webClient bean) ----
apps.http.client.pool-name=das
apps.http.client.max-connections=200
apps.http.client.pending-acquire-max-count=2000
apps.http.client.pending-acquire-timeout-ms=45000
apps.http.client.max-idle-time-seconds=30
apps.http.client.max-life-time-seconds=300
apps.http.client.connect-timeout-ms=10000
apps.http.client.response-timeout-seconds=300
apps.http.client.max-in-memory-size=10485760

# Hikari pool name (max pool size is usually set per profile; size it with: instances × pool ≤ DB limit)
spring.datasource.hikari.pool-name=cas-storage-pool

## ===============================
## = JPA / HIBERNATE
## ===============================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.envers.autoRegisterListeners=true
spring.jpa.properties.hibernate.envers.storeDataAtDelete=true

spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.id.new_generator_mappings=true
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

spring.profiles.active=local

